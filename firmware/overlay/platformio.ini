; PlatformIO config for Freematics patched telelogger firmware.
; - native env: host-side unit tests of configstore + serial_handler (TDD).
; - esp32dev env: builds patched telelogger against the Freematics repo.

[platformio]
default_envs = native

[env:native]
platform = native
build_flags =
  -I test
  -I overlay
  -DARDUINO_NATIVE
build_src_filter = +<../overlay/configstore.cpp> +<../overlay/serial_handler.cpp>
build_type = test
test_build_src = true

[env:esp32dev]
platform = espressif32@^6.7.0
board = esp32dev
framework = arduino
build_flags =
  -DENABLE_SERIAL_CMD=1
  -DCONFIG_MODE_TIMEOUT=0
  -I firmware_v5/telelogger
src_dir = firmware_v5/telelogger
lib_extra_dirs =
  firmware_v5/lib
  firmware_v5/telelogger
monitor_speed = 115200
board_build.partitions = default.csv
